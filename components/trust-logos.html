<!--
  ============================================================================
  TRUST BAR — real media logos
  ============================================================================
  Drop-in replacement for the marquee in index.html §2 (search for
  "Het MAIN CHARACTER universum").

  ⚠️  ONLY use logos you can substantiate. A "Featured in" strip is the single
  most-checked claim on a page like this — a sceptical buyer will Google one.
  Fabricated media logos are also exactly the sort of misrepresentation that
  gets a Meta ad account restricted, which costs more than the section is worth.

  If you can substantiate three logos, ship three. A short honest strip beats a
  long dishonest one, and it beats no strip at all.

  Logo prep:
    - SVG, single colour, currentColor (they inherit .logo-mark's opacity/hover)
    - Optically balanced — trim whitespace, then size by visual weight, not by
      bounding box. A wide wordmark and a square mark at the same px height
      look nothing alike.
    - Height ~22px. Wordmarks can run wider; marks should stay square-ish.
============================================================================ -->

<section class="py-14 border-y border-[color:var(--ink-line)] bg-[color:var(--ink-soft)] relative overflow-hidden">
  <p class="eyebrow text-center mb-8 opacity-70">Onyema sprak en regisseerde voor</p>

  <div class="marquee" aria-label="Organisaties waarvoor Onyema sprak">
    <!-- Track 1 -->
    <div class="marquee-track">
      <img src="../assets/images/logos/logo-1.svg" alt="Verenigde Naties" class="h-[22px] w-auto opacity-60 hover:opacity-100 transition-opacity" loading="lazy" />
      <img src="../assets/images/logos/logo-2.svg" alt="" class="h-[22px] w-auto opacity-60 hover:opacity-100 transition-opacity" loading="lazy" />
      <img src="../assets/images/logos/logo-3.svg" alt="" class="h-[22px] w-auto opacity-60 hover:opacity-100 transition-opacity" loading="lazy" />
      <img src="../assets/images/logos/logo-4.svg" alt="" class="h-[22px] w-auto opacity-60 hover:opacity-100 transition-opacity" loading="lazy" />
      <img src="../assets/images/logos/logo-5.svg" alt="" class="h-[22px] w-auto opacity-60 hover:opacity-100 transition-opacity" loading="lazy" />
      <img src="../assets/images/logos/logo-6.svg" alt="" class="h-[22px] w-auto opacity-60 hover:opacity-100 transition-opacity" loading="lazy" />
    </div>

    <!-- Track 2 — an exact duplicate. The CSS marquee translates track 1 by
         -100% and this one seamlessly takes its place. aria-hidden so screen
         readers announce the list once. -->
    <div class="marquee-track" aria-hidden="true">
      <img src="../assets/images/logos/logo-1.svg" alt="" class="h-[22px] w-auto opacity-60" loading="lazy" />
      <img src="../assets/images/logos/logo-2.svg" alt="" class="h-[22px] w-auto opacity-60" loading="lazy" />
      <img src="../assets/images/logos/logo-3.svg" alt="" class="h-[22px] w-auto opacity-60" loading="lazy" />
      <img src="../assets/images/logos/logo-4.svg" alt="" class="h-[22px] w-auto opacity-60" loading="lazy" />
      <img src="../assets/images/logos/logo-5.svg" alt="" class="h-[22px] w-auto opacity-60" loading="lazy" />
      <img src="../assets/images/logos/logo-6.svg" alt="" class="h-[22px] w-auto opacity-60" loading="lazy" />
    </div>
  </div>
</section>
